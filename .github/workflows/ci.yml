name: CI

on: push

jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v6
      
      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with: 
          distribution: 'temurin'
          java-version: '21'
      
      - name: Build e testes com maven
        run: mvn clean verify
