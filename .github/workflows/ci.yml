name: CI

on: 
  push: 
    branches: [main]
  pull_request:
    branches: [main]
  
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and tests with maven
        run: mvn -B clean verify --file pom.xml
